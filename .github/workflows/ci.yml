name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: mvn -B verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/target/surefire-reports/*.xml'

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Helm lint
        run: helm lint helm/devroom

      - name: Helm template (render check)
        run: helm template devroom helm/devroom > /dev/null

  images:
    # Publish container images to GHCR only for merged code (push to main),
    # not on PRs. PRs still run the build + helm jobs for validation.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: auth-service
            dockerfile: services/auth-service/Dockerfile
          - service: user-service
            dockerfile: services/user-service/Dockerfile
          - service: message-service
            dockerfile: services/message-service/Dockerfile
          - service: gateway
            dockerfile: services/gateway/Dockerfile
          - service: bot-service
            dockerfile: services/bot-service/Dockerfile
          - service: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/annikaholmqvist94/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/annikaholmqvist94/${{ matrix.service }}:latest
