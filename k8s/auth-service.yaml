apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: devroom
spec:
  replicas: 1
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service }
    spec:
      containers:
      - name: auth-service
        image: devroom/auth-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://auth-db:5432/authdb
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom: { secretKeyRef: { name: db-credentials, key: username } }
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom: { secretKeyRef: { name: db-credentials, key: password } }
        - name: SPRING_RABBITMQ_HOST
          value: rabbitmq
        - name: SPRING_RABBITMQ_USERNAME
          valueFrom: { secretKeyRef: { name: rabbitmq-credentials, key: username } }
        - name: SPRING_RABBITMQ_PASSWORD
          valueFrom: { secretKeyRef: { name: rabbitmq-credentials, key: password } }
        - name: AUTH_ISSUER_URI
          value: http://auth-service:8081
        - name: GATEWAY_CLIENT_SECRET
          valueFrom: { secretKeyRef: { name: oauth-client-secrets, key: gateway-client-secret } }
        - name: BOT_CLIENT_SECRET
          valueFrom: { secretKeyRef: { name: oauth-client-secrets, key: bot-service-client-secret } }
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
        resources:
          requests: { memory: 512Mi, cpu: 200m }
          limits:   { memory: 1Gi,   cpu: 1 }
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: devroom
spec:
  selector: { app: auth-service }
  ports:
  - port: 8081
    targetPort: 8081
