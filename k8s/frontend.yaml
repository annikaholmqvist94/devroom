apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devroom
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
      - name: frontend
        image: devroom/frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        # Browsern hämtar denna URL — måste vara nåbar utanför clustret.
        # Demo-setupen använder 'kubectl port-forward svc/gateway 8080:8080'
        # vilket gör Gateway tillgänglig på host:s localhost:8080.
        - name: NEXT_PUBLIC_GATEWAY_URL
          value: http://localhost:8080
        - name: HOSTNAME
          value: "0.0.0.0"
        - name: PORT
          value: "3000"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests: { memory: 128Mi, cpu: 50m }
          limits:   { memory: 384Mi, cpu: 500m }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: devroom
spec:
  selector: { app: frontend }
  ports:
  - port: 3000
    targetPort: 3000
