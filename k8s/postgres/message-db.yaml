apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: message-db
  namespace: devroom
spec:
  serviceName: message-db
  replicas: 1
  selector:
    matchLabels: { app: message-db }
  template:
    metadata:
      labels: { app: message-db }
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_DB
          value: messagedb
        - name: POSTGRES_USER
          valueFrom: { secretKeyRef: { name: db-credentials, key: username } }
        - name: POSTGRES_PASSWORD
          valueFrom: { secretKeyRef: { name: db-credentials, key: password } }
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
          subPath: pgdata
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests: { memory: 256Mi, cpu: 100m }
          limits:   { memory: 512Mi, cpu: 500m }
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: message-db
  namespace: devroom
spec:
  selector: { app: message-db }
  clusterIP: None
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
