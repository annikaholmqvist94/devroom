server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: dbuser
    password: dbpass
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: devroom
    password: devroom
  security:
    oauth2:
      authorizationserver:
        # Issuer URL — vad nedströms services förväntar sig i 'iss'-claim.
        # Override via AUTH_ISSUER_URI i docker compose / K8s till intern-DNS
        # (t.ex. http://auth-service:8081). Browser-redirect-flödet kräver att
        # samma värde är resolvable från browsern.
        issuer: ${AUTH_ISSUER_URI:http://localhost:8081}
        # OAuth2-klienter (Variant F): Boot auto-konfigurerar InMemoryRegisteredClientRepository
        # från dessa properties vid uppstart. Vid restart återskapas identiska klienter.
        client:
          gateway:
            registration:
              client-id: gateway
              # {noop}-prefix för dev: plaintext-jämförelse. I prod: {bcrypt}<hash> via K8s Secret.
              client-secret: "{noop}${GATEWAY_CLIENT_SECRET:dev-gateway-secret-change-me}"
              client-name: "Devroom Gateway"
              client-authentication-methods:
                - client_secret_basic
              authorization-grant-types:
                - authorization_code
                - refresh_token
              redirect-uris:
                - "http://localhost:8080/login/oauth2/code/auth-service"
              post-logout-redirect-uris:
                - "http://localhost:3000/"
              scopes:
                - openid
                - profile
            require-authorization-consent: false
            require-proof-key: true   # PKCE
            token:
              access-token-time-to-live: 1h
              refresh-token-time-to-live: 24h
              access-token-format: self-contained
          bot:
            registration:
              client-id: bot-service
              client-secret: "{noop}${BOT_CLIENT_SECRET:dev-bot-secret-change-me}"
              client-name: "Devroom Bot Service"
              client-authentication-methods:
                - client_secret_basic
              authorization-grant-types:
                - client_credentials
              scopes:
                - "bot:write"
            require-authorization-consent: false
            token:
              access-token-time-to-live: 1h
              access-token-format: self-contained

devroom:
  auth:
    demo-team-id: 11111111-1111-1111-1111-111111111111

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
