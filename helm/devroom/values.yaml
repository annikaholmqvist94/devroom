global:
  imageRegistry: devroom
  imageTag: latest
  imagePullPolicy: Never

services: {}

databases: {}

infra:
  enabled: true
  postgres:
    image: postgres:16-alpine
    resources:
      requests: { memory: 256Mi, cpu: 100m }
      limits:   { memory: 512Mi, cpu: 500m }
  rabbitmq:
    image: rabbitmq:4-management-alpine
    resources:
      requests: { memory: 256Mi, cpu: 100m }
      limits:   { memory: 512Mi, cpu: 500m }

secrets: {}
