{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devroom
  labels:
    {{- include "devroom.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /oauth2/authorization
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /login
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /logout
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /signup
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
  - host: {{ .Values.ingress.authHost }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8081
{{- end }}
