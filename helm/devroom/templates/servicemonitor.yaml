{{- if .Values.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: devroom
  labels:
    {{- include "devroom.labels" . | nindent 4 }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      devroom.io/metrics: "true"
  endpoints:
  - port: http
    path: /actuator/prometheus
    interval: 15s
{{- end }}
